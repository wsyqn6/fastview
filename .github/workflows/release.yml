name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: fastview

jobs:
  # Linux 发布
  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --release
      
      - name: Create package
        run: |
          cd target/release
          tar czf ${{ env.PROJECT_NAME }}-linux-x86_64.tar.gz ${{ env.PROJECT_NAME }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: target/release/${{ env.PROJECT_NAME }}-linux-x86_64.tar.gz

  # Windows 发布
  release-windows:
    name: Release Windows
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --release
      
      - name: Create package
        shell: pwsh
        run: |
          Compress-Archive -Path "target\release\${{ env.PROJECT_NAME }}.exe" -DestinationPath "target\release\${{ env.PROJECT_NAME }}-windows-x86_64.zip"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: target/release/${{ env.PROJECT_NAME }}-windows-x86_64.zip

  # macOS 发布
  release-macos:
    name: Release macOS
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --release
      
      - name: Create package
        run: |
          cd target/release
          tar czf ${{ env.PROJECT_NAME }}-macos.tar.gz ${{ env.PROJECT_NAME }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: target/release/${{ env.PROJECT_NAME }}-macos.tar.gz

  # 创建 GitHub Release
  create-release:
    name: Create GitHub Release
    needs: [release-linux, release-windows, release-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release-linux/*
            artifacts/release-windows/*
            artifacts/release-macos/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
